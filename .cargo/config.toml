[target.aarch64-unknown-none]
rustflags = [
    "-C", "link-arg=-static",
    "-C", "relocation-model=static",
    "-Z", "unstable-options",
]

[target.aarch64-mars-none]
rustflags = [
    "-C", "link-arg=-static",
    "-C", "relocation-model=static",
    "-Z", "unstable-options",
]

[target.aarch64-unknown-uefi]
rustflags = [
    "-C", "link-arg=-pie",
    "-C", "relocation-model=pie",
]
